# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [created]

  workflow_dispatch:
    inputs:
      version_bump:
        description: 'The version portion to increment'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major
permissions:
  contents: write

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Bump version
      if: github.event_name == 'workflow_dispatch'
      run: |
        INIT_FILE="src/twoblock/__init__.py"
        # Extract current version, stripping any pre-release suffix (e.g. -beta.2)
        CURRENT=$(grep '__version__' "$INIT_FILE" | sed 's/.*"\(.*\)"/\1/' | sed 's/-.*//')
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

        case "${{ inputs.version_bump }}" in
          major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
          patch) PATCH=$((PATCH + 1)) ;;
        esac

        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        sed -i "s/__version__ = \".*\"/__version__ = \"${NEW_VERSION}\"/" "$INIT_FILE"
        echo "Bumped version to ${NEW_VERSION}"

        # Update __date__ to today
        sed -i "s/__date__ = \".*\"/__date__ = \"$(date +%Y-%m-%d)\"/" "$INIT_FILE"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add "$INIT_FILE"
        git commit -m "Bump version to ${NEW_VERSION}"
        git push
    - name: Build and publish
      env:
        TWINE_USERNAME: ${{ secrets.PYPIUID }}
        TWINE_PASSWORD: ${{ secrets.PYPIPWD }}
      run: |
        python -m pip install twine
        python -m build
        twine upload dist/*
